<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlexSim Station Console</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="header-brand header-brand--autodesk">
      <img
        src="assets/autodesk-logo-white.svg"
        alt="Autodesk"
        class="header-logo header-logo--autodesk"
        width="124"
        height="21"
      >
    </div>
    <div class="session-code">Session: <span id="sessionCode">A3X9K2</span></div>
    <div class="header-brand header-brand--flexsim">
      <img
        src="assets/flexsim-logo.svg"
        alt="FlexSim"
        class="header-logo header-logo--flexsim"
      >
    </div>
  </header>

  <main>
    <aside class="sidebar sidebar-left">
      <h2 class="sidebar-title sidebar-title--yellow">PRODUCTS</h2>
      <div class="palette palette--products" id="productPalette">
        <button class="piece piece--product" data-id="Product_A" data-type="product">
          <div class="piece__icon"></div>
          <div class="piece__label">Airfryer</div>
        </button>
        <button class="piece piece--product" data-id="Product_B" data-type="product">
          <div class="piece__icon"></div>
          <div class="piece__label">Utility Knife</div>
        </button>
        <button class="piece piece--product" data-id="Product_C" data-type="product">
          <div class="piece__icon"></div>
          <div class="piece__label">Sim Wheel</div>
        </button>
        <button class="piece piece--product" data-id="Product_D" data-type="product">
          <div class="piece__icon"></div>
          <div class="piece__label">Speaker</div>
        </button>
      </div>
    </aside>

    <section class="factory-area">
      <!-- Product slot outside the building -->
      <div class="product-slot-area">
        <div class="slot slot--product" data-slot="reader_0" id="slot-product">
          <div class="slot__ring"></div>
          <div class="slot__label">SELECT PRODUCT</div>
        </div>
      </div>

      <!-- Factory building -->
      <div class="factory-building">
        <svg class="factory-svg" viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="glow-blue">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="glow-yellow">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#1d1d1d"/>
              <stop offset="100%" stop-color="#151515"/>
            </linearGradient>
          </defs>

          <!-- Factory floor -->
          <rect x="0" y="0" width="600" height="450" fill="url(#floorGrad)"/>

          <!-- Corridor area (slightly lighter) -->
          <rect x="12" y="12" width="576" height="426" fill="#1e1e1e" rx="2"/>

          <!-- Station zones (subtly lighter floor areas, no borders) -->
          <rect x="120" y="80" width="90" height="350" fill="#242424" rx="3"/>
          <rect x="250" y="20" width="330" height="185" fill="#242424" rx="3"/>
          <rect x="250" y="250" width="330" height="180" fill="#242424" rx="3"/>

          <!-- Outer building walls drawn as individual lines -->
          <!-- Top wall - unbroken -->
          <line x1="6" y1="6" x2="594" y2="6" stroke="#4a4a4a" stroke-width="10" stroke-linecap="square"/>
          <!-- Right wall - unbroken -->
          <line x1="594" y1="6" x2="594" y2="444" stroke="#4a4a4a" stroke-width="10" stroke-linecap="square"/>
          <!-- Bottom wall - unbroken -->
          <line x1="6" y1="444" x2="594" y2="444" stroke="#4a4a4a" stroke-width="10" stroke-linecap="square"/>
          <!-- Left wall - with opening near top for truck -->
          <line x1="6" y1="6" x2="6" y2="25" stroke="#4a4a4a" stroke-width="10" stroke-linecap="square"/>
          <line x1="6" y1="85" x2="6" y2="444" stroke="#4a4a4a" stroke-width="10" stroke-linecap="square"/>
          <!-- Gap in left wall from y=25 to y=85 is the Goods In/Out opening -->

          <!-- Truck (partially outside the building through the opening) -->
          <rect x="-20" y="32" width="60" height="46" fill="#333" rx="4" stroke="#555" stroke-width="1.5"/>
          <rect x="18" y="38" width="18" height="34" fill="#3d3d3d" rx="2" stroke="#555" stroke-width="1"/>
          <text x="50" y="60" font-family="Arial, sans-serif" font-size="10" fill="#666" font-weight="bold">GOODS IN/OUT</text>

          <!-- Internal partition wall (single continuous wall) -->
          <!-- Horizontal: from right wall going left, at y=225 -->
          <line x1="594" y1="225" x2="225" y2="225" stroke="#4a4a4a" stroke-width="10" stroke-linecap="square"/>
          <!-- Vertical: turns down between slots 4 and 5, stops before bottom wall -->
          <line x1="225" y1="225" x2="225" y2="400" stroke="#4a4a4a" stroke-width="10" stroke-linecap="square"/>
          <!-- (Gap from y=400 to bottom wall at y=444 for operator passage) -->
        </svg>

        <!-- Station slots positioned over the SVG -->
        <div class="slots-overlay">
          <!-- Left zone: slots 1 (top) and 4 (bottom) -->
          <div class="slot slot--station" data-slot="reader_1" id="slot-1" style="left: 12%; top: 28%;">
            <div class="slot__ring"></div>
            <div class="slot__number">1</div>
          </div>
          <div class="slot slot--station" data-slot="reader_4" id="slot-4" style="left: 12%; top: 68%;">
            <div class="slot__ring"></div>
            <div class="slot__number">4</div>
          </div>

          <!-- Top-right zone: slots 2 and 3 -->
          <div class="slot slot--station" data-slot="reader_2" id="slot-2" style="left: 52%; top: 28%;">
            <div class="slot__ring"></div>
            <div class="slot__number">2</div>
          </div>
          <div class="slot slot--station" data-slot="reader_3" id="slot-3" style="left: 76%; top: 28%;">
            <div class="slot__ring"></div>
            <div class="slot__number">3</div>
          </div>

          <!-- Bottom-right zone: slots 5 and 6 -->
          <div class="slot slot--station" data-slot="reader_5" id="slot-5" style="left: 52%; top: 68%;">
            <div class="slot__ring"></div>
            <div class="slot__number">5</div>
          </div>
          <div class="slot slot--station" data-slot="reader_6" id="slot-6" style="left: 76%; top: 68%;">
            <div class="slot__ring"></div>
            <div class="slot__number">6</div>
          </div>
        </div>
      </div>

      <!-- Commit button -->
      <div class="actions">
        <button class="btn btn--clear" id="btnClear">CLEAR</button>
        <button class="btn btn--commit" id="btnCommit">COMMIT</button>
      </div>
    </section>

    <aside class="sidebar sidebar-right">
      <h2 class="sidebar-title sidebar-title--blue">STATIONS</h2>
      <div class="palette palette--stations" id="stationPalette">
        <div class="category-group">
          <div class="category-label">Plastic Mfg</div>
          <button class="piece piece--station" data-id="Machine_E" data-type="station">
            <div class="piece__icon"></div>
            <div class="piece__label">3D Printer</div>
          </button>
          <button class="piece piece--station" data-id="Machine_F" data-type="station">
            <div class="piece__icon"></div>
            <div class="piece__label">Injection Mould</div>
          </button>
        </div>
        <div class="category-group">
          <div class="category-label">Metal Mfg</div>
          <button class="piece piece--station" data-id="Machine_H" data-type="station">
            <div class="piece__icon"></div>
            <div class="piece__label">CNC Milling</div>
          </button>
          <button class="piece piece--station" data-id="Machine_G" data-type="station">
            <div class="piece__icon"></div>
            <div class="piece__label">Die Casting</div>
          </button>
        </div>
        <div class="category-group">
          <div class="category-label">QA</div>
          <button class="piece piece--station" data-id="Machine_I" data-type="station">
            <div class="piece__icon"></div>
            <div class="piece__label">Automated QA</div>
          </button>
          <button class="piece piece--station" data-id="Machine_J" data-type="station">
            <div class="piece__icon"></div>
            <div class="piece__label">Manual QA</div>
          </button>
        </div>
        <div class="category-group">
          <div class="category-label">Assembly</div>
          <button class="piece piece--station" data-id="Machine_B" data-type="station">
            <div class="piece__icon"></div>
            <div class="piece__label">Auto Assembly</div>
          </button>
          <button class="piece piece--station" data-id="Machine_D" data-type="station">
            <div class="piece__icon"></div>
            <div class="piece__label">Manual Assembly</div>
          </button>
        </div>
        <div class="category-group">
          <div class="category-label">Storage</div>
          <button class="piece piece--station" data-id="Machine_C" data-type="station">
            <div class="piece__icon"></div>
            <div class="piece__label">Auto Storage</div>
          </button>
          <button class="piece piece--station" data-id="Machine_A" data-type="station">
            <div class="piece__icon"></div>
            <div class="piece__label">Manual Store</div>
          </button>
        </div>
      </div>
    </aside>
  </main>

  <script src="icons.js"></script>
  <script src="app.js"></script>
</body>
</html>
